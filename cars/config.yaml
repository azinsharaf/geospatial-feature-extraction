train: data/train/images
val: data/val/images
test: data/test/images
nc: 1
names: ["car"]

# Training configuration for pipeline.py (used by train_yolov8)
training:
  model: models/yolov8s.pt # YOLOv8 model variant
  epochs: 200
  imgsz: 640
  batch: 16
  device: 0 # or "cpu", "0,1", etc.
  workers: 8
  project: cars
  name: yolov8s_cars

# Inference configuration for pipeline.py (used by run_inference)
inference:
  # Default to the best checkpoint produced by training
  model: models/yolov8s_cars_best.pt
  source: data/test/images
  imgsz: 640
  conf: 0.25
  iou: 0.45
  device: 0 # or "cpu", "0,1", etc.
  project: cars
  name: yolov8s_cars_infer_184epoch

# WMTS configuration for data ingestion
wmts:
  service_name: PICT-CAALAM23-lIoWT9vYRg
  # Base WMTS endpoint (used for capabilities and KVP-style requests)
  url: https://svc.pictometry.com/Image/6D9E15C5-C6B4-4ACB-A244-4C44ECA33D90/wmts
  layer: PICT-CAALAM23-lIoWT9vYRg
  # From <TileMatrixSet>GoogleMapsCompatible</TileMatrixSet>
  tile_matrix_set: GoogleMapsCompatible
  # TileMatrix identifier / zoom level (0-30). Adjust as needed.
  tile_matrix: 20
  style: default
  format: image/png
  # Optional REST-style resource template (preferred when available).
  # Derived from the WMTS capabilities <ResourceURL> element.
  resource_url_template: "https://svc.pictometry.com/Image/6D9E15C5-C6B4-4ACB-A244-4C44ECA33D90/wmts/PICT-CAALAM23-lIoWT9vYRg/{Style}/{TileMatrixSet}/{TileMatrix}/{TileCol}/{TileRow}.png"
